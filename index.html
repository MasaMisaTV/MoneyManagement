<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>MoneyManagement</title>
<style>
body {
  font-family: sans-serif;
  padding: 20px;
  max-width: 700px;
  margin: auto;
  background: #f6fff4;
  color: #333;
}
input, button {
  width: 100%;
  padding: 8px;
  margin: 4px 0;
  box-sizing: border-box;
}
h1, h2 {
  text-align: center;
}
#currentDate {
  text-align: center;
  font-size: 14px;
  margin-bottom: 10px;
}
#status {
  margin: 10px 0;
  color: green;
  text-align: center;
}
#settingsBtn, #closeSettingsBtn {
  position: fixed;
  top: 5px;
  right: 8px;
  font-size: 14px;
  padding: 8px 12px;
  background: #2e8b57;
  color: #fff;
  border: none;
  border-radius: 6px;
  z-index: 1000;
  cursor: pointer;
}
#closeSettingsBtn {
  display: none;
}
#settingsPanel {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: #f6fff4;
  overflow-y: auto;
  z-index: 999;
}
#settingsContent {
  max-width: 700px;
  margin: auto;
  padding: 20px;
}
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
  background: #fff;
}
th, td {
  border: 1px solid #ccc;
  padding: 6px;
  text-align: center;
}
.hidden {
  display: none;
}
.summary-box {
  background: #ffffff;
  border: 1px solid #d9e8d7;
  border-radius: 10px;
  padding: 14px;
  margin: 16px 0;
  line-height: 1.8;
}
</style>
</head>
<body>
<h2>お金の出入りをかんたん管理！</h2>
<h1>MoneyManagement</h1>

<div id="currentDate"></div>

<div id="loginSection">
  <input id="userNumber" placeholder="ユーザー番号">
  <button onclick="signIn()">サインイン</button>
  <button onclick="showSignup()">サインアップ</button>
</div>

<div id="signupSection" class="hidden">
  <input id="signupUserNumber" placeholder="ユーザー番号">
  <input id="signupNickname" placeholder="ニックネーム">
  <button onclick="signUp()">登録する</button>
  <button onclick="showLogin()">戻る</button>
</div>

<div id="mainSection" class="hidden">
  <button id="settingsBtn" onclick="toggleSettings(true)">設定</button>

  <div class="summary-box">
    <strong>ニックネーム:</strong> <span id="nicknameDisplay"></span><br>
    <strong>現在の貯金額:</strong> <span id="balanceAmount">0</span> 円<br>
    <strong>総追加額:</strong> <span id="totalAdded">0</span> 円<br>
    <strong>総使用額:</strong> <span id="totalUsed">0</span> 円
  </div>

  <label>使ったお金（円）:</label>
  <input type="number" id="usedMoney" value="0" min="0">

  <label>追加したお金（円）:</label>
  <input type="number" id="addedMoney" value="0" min="0">

  <button onclick="updateMoney()">記録する</button>

  <table>
    <thead>
      <tr>
        <th>日付</th>
        <th>使ったお金</th>
        <th>追加したお金</th>
        <th>その日の残高</th>
      </tr>
    </thead>
    <tbody id="historyList"></tbody>
  </table>

  <button style="margin-top:20px;" onclick="logout()">ログアウト</button>
</div>

<div id="settingsPanel">
  <div id="settingsContent">
    <button id="closeSettingsBtn" onclick="toggleSettings(false)">戻る</button>
    <h1>設定</h1>

    <label>日付:</label>
    <input type="date" id="manualDate">

    <label>使ったお金（円）:</label>
    <input type="number" id="manualUsedMoney" value="0" min="0">

    <label>追加したお金（円）:</label>
    <input type="number" id="manualAddedMoney" value="0" min="0">

    <button onclick="addManualEntry()">+ 記録を追加</button>

    <hr>

    <label>削除する日付:</label>
    <input type="date" id="deleteDate">
    <button onclick="deleteEntry()">× 記録を削除</button>
  </div>
</div>

<div id="status"></div>

<script>
const apiUrl = "https://script.google.com/macros/s/AKfycbwFYRJZ8TWtuKBvOG9_JKT2g_9laPW7roVobYDDfAl5sm04AiATbRarlYa_sVfshaBN/exec";

let currentUser = "";
let nickname = "";
let balanceAmount = 0;
let history = [];

function getTodayJST() {
  const now = new Date();
  now.setHours(now.getHours() + 9);
  return now.toISOString().split("T")[0];
}

document.getElementById("currentDate").textContent = "今日の日付: " + getTodayJST();
document.getElementById("manualDate").setAttribute("max", getTodayJST());
document.getElementById("deleteDate").setAttribute("max", getTodayJST());

function showSignup() {
  document.getElementById("loginSection").classList.add("hidden");
  document.getElementById("signupSection").classList.remove("hidden");
}

function showLogin() {
  document.getElementById("signupSection").classList.add("hidden");
  document.getElementById("loginSection").classList.remove("hidden");
}

function signIn() {
  const user = document.getElementById("userNumber").value.trim();
  if (!user) {
    alert("ユーザー番号を入力してください");
    return;
  }

  fetch(apiUrl + "?user=" + encodeURIComponent(user))
    .then(res => res.text())
    .then(txt => {
      if (!txt || txt === "{}") {
        alert("ユーザーが存在しません");
        return;
      }

      currentUser = user;
      const data = JSON.parse(txt);
      history = data.history || [];
      nickname = data.nickname || "";

      document.getElementById("nicknameDisplay").textContent = nickname;
      document.getElementById("loginSection").classList.add("hidden");
      document.getElementById("signupSection").classList.add("hidden");
      document.getElementById("mainSection").classList.remove("hidden");

      saveData();
      document.getElementById("status").textContent = "サインインしました";
    });
}

function signUp() {
  const user = document.getElementById("signupUserNumber").value.trim();
  const nick = document.getElementById("signupNickname").value.trim();

  if (!user || !nick) {
    alert("ユーザー番号とニックネームを入力してください");
    return;
  }

  fetch(apiUrl + "?user=" + encodeURIComponent(user) + "&mode=signup&nickname=" + encodeURIComponent(nick), {
    method: "POST",
    body: ""
  })
    .then(res => res.text())
    .then(txt => {
      const data = JSON.parse(txt);
      if (data.error) {
        alert(data.error);
        return;
      }
      alert("サインアップが完了しました。ログインしてください。");
      showLogin();
    });
}

function saveToServer() {
  if (!currentUser) return;

  const content = JSON.stringify(history);
  fetch(apiUrl + "?user=" + encodeURIComponent(currentUser) + "&mode=save", {
    method: "POST",
    body: content
  })
    .then(res => res.text())
    .then(() => {
      document.getElementById("status").textContent = "保存しました";
    });
}

function rebuildBalance() {
  balanceAmount = 0;

  history.sort((a, b) => a.time.localeCompare(b.time));

  history.forEach(e => {
    balanceAmount += e.added - e.used;
    e.total = balanceAmount;
  });
}

function updateDisplay() {
  let totalAdded = 0;
  let totalUsed = 0;

  history.forEach(e => {
    totalAdded += e.added;
    totalUsed += e.used;
  });

  document.getElementById("balanceAmount").textContent = balanceAmount;
  document.getElementById("totalAdded").textContent = totalAdded;
  document.getElementById("totalUsed").textContent = totalUsed;
}

function saveData() {
  rebuildBalance();
  updateDisplay();
  refreshHistory();
  saveToServer();
}

function updateMoney() {
  const used = parseInt(document.getElementById("usedMoney").value) || 0;
  const added = parseInt(document.getElementById("addedMoney").value) || 0;

  if (used === 0 && added === 0) {
    alert("使ったお金または追加したお金を入力してください");
    return;
  }

  const today = getTodayJST();
  const idx = history.findIndex(e => e.time === today);
  const entry = { time: today, used, added };

  if (idx !== -1) {
    history[idx] = entry;
  } else {
    history.push(entry);
  }

  saveData();
}

function addManualEntry() {
  const time = document.getElementById("manualDate").value;
  if (!time) {
    alert("日付を選んでください");
    return;
  }

  const today = getTodayJST();
  if (time > today) {
    alert("今日より後の日付は選べません");
    return;
  }

  const used = parseInt(document.getElementById("manualUsedMoney").value) || 0;
  const added = parseInt(document.getElementById("manualAddedMoney").value) || 0;

  if (used === 0 && added === 0) {
    alert("使ったお金または追加したお金を入力してください");
    return;
  }

  const idx = history.findIndex(e => e.time === time);
  const entry = { time, used, added };

  if (idx !== -1) {
    history[idx] = entry;
  } else {
    history.push(entry);
  }

  saveData();
}

function deleteEntry() {
  const delTime = document.getElementById("deleteDate").value;
  const index = history.findIndex(e => e.time === delTime);

  if (index === -1) {
    alert("その日付の履歴が見つかりません。");
    return;
  }

  history.splice(index, 1);
  saveData();
}

function logout() {
  if (confirm("ログアウトしますか？")) {
    location.reload();
  }
}

function refreshHistory() {
  const list = document.getElementById("historyList");
  list.innerHTML = "";

  history.slice().sort((a, b) => b.time.localeCompare(a.time)).forEach(e => {
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${e.time}</td>
      <td>${e.used} 円</td>
      <td>${e.added} 円</td>
      <td>${e.total} 円</td>
    `;
    list.appendChild(row);
  });
}

function toggleSettings(show) {
  document.getElementById("settingsPanel").style.display = show ? "block" : "none";
  document.getElementById("settingsBtn").style.display = show ? "none" : "inline-block";
  document.getElementById("closeSettingsBtn").style.display = show ? "inline-block" : "none";
}
</script>
</body>
</html>
